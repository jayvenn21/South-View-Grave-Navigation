name: Update graves from Google Sheet

on:
  # Manual trigger from GitHub UI or API (Google Apps Script can call this)
  workflow_dispatch:
  # Also run on a schedule so new form submissions get picked up even without a trigger
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas

      - name: Download updates CSV from Google Sheet
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: |
          if [ -z "$GOOGLE_SHEET_CSV_URL" ]; then
            echo "GOOGLE_SHEET_CSV_URL secret not set — skipping download."
            exit 0
          fi
          mkdir -p data/updates
          curl -fsSL "$GOOGLE_SHEET_CSV_URL" -o data/updates/southview-burial-updates.csv
          echo "Downloaded updates CSV ($(wc -l < data/updates/southview-burial-updates.csv) lines)."

      - name: Rebuild graves.json
        run: python python/convert.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/graves.json data/coordinates.json
          if git diff --cached --quiet; then
            echo "No changes to graves data."
          else
            git commit -m "Update graves data from Google Sheet form responses"
            git push
          fi
